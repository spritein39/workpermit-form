<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Work Permit Booking</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.container{
background:white;
padding:25px;
border-radius:10px;
max-width:500px;
margin:auto;
}

h2{
text-align:center;
margin-bottom:20px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
font-size:16px;
}

button{
background:#06C755;
color:white;
border:none;
cursor:pointer;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>Work Permit Booking</h2>

<form method="POST"
action="https://script.google.com/macros/s/AKfycbxtjOhYPkeNScEC42_h8-dMzS_XD9NzHTBybmN4UHdok_u8q5WFpaNtHd4-pHnwsfCG/exec">

<label>Company</label>

<select name="company" id="company" onchange="selectCompany()">

<option value="">Select Company</option>

<option value="C001">สร้อยคำ</option>
<option value="C002">Admin</option>

</select>

<label>Contact Name</label>

<input name="name" id="name" readonly>

<label>Phone</label>

<input name="phone" id="phone" readonly>

<label>Work Title</label>

<input name="title">

<label>Work Area</label>

<input name="area">

<label>Proposed Date</label>

<input type="date" name="date">

<label>Time Slot</label>

<select name="timeslot" id="timeslot"></select>

<button type="submit">Submit Booking</button>

</form>

</div>

<script>

const contractors={

"C001":{
name:"สาวิตรี",
phone:"0923336781"
},

"C002":{
name:"Admin",
phone:"0989081129"
}

};

function selectCompany(){

const code=document.getElementById("company").value;

if(contractors[code]){

document.getElementById("name").value=contractors[code].name;

document.getElementById("phone").value=contractors[code].phone;

}

}

function generateTimeSlots(){

const select=document.getElementById("timeslot");

for(let h=8;h<18;h++){

for(let m=0;m<60;m+=15){

let startTime=
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0");

let endMinute=m+15;

let endHour=h;

if(endMinute==60){

endMinute=0;

endHour++;

}

let endTime=
String(endHour).padStart(2,"0")+":"+
String(endMinute).padStart(2,"0");

let option=document.createElement("option");

option.value=startTime;

option.text=startTime+" - "+endTime;

select.appendChild(option);

}

}

}

generateTimeSlots();

</script>

</body>

</html>
