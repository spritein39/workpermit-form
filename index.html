<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Work Permit Booking</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:500px;
margin:auto;
}

h2{
text-align:center;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
font-size:16px;
}

button{
background:#06C755;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Work Permit Booking</h2>

<select id="company" onchange="selectCompany()">
<option value="">Select Company</option>
<option value="C001">สร้อยคำ</option>
<option value="C002">Admin</option>
</select>

<input id="name" placeholder="Contact Name" readonly>

<input id="phone" placeholder="Phone" readonly>

<input id="title" placeholder="Work Title">

<select id="area">
<option value="">Select Area</option>
<option>Tank Farm</option>
<option>Boiler</option>
<option>Warehouse</option>
</select>

<label>Start Date</label>
<input type="date" id="start">

<label>End Date</label>
<input type="date" id="end">

<button onclick="submitForm()">Submit Booking</button>

</div>

<script>

const contractors = {

"C001":{
name:"สาวิตรี",
phone:"0923336781"
},

"C002":{
name:"Admin",
phone:"0989081129"
}

};

function selectCompany(){

const code=document.getElementById("company").value;

if(contractors[code]){

document.getElementById("name").value=contractors[code].name;
document.getElementById("phone").value=contractors[code].phone;

}

}

async function submitForm(){

const data={

company:document.getElementById("company").value,
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
title:document.getElementById("title").value,
area:document.getElementById("area").value,
start:document.getElementById("start").value,
end:document.getElementById("end").value

};

console.log(data);

alert("Work Permit Submitted");

}

</script>

</body>
</html>
